<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>사닥다리ON · 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--navy2:#243460;--gold:#c8a84b;--gold2:#e0c070;--bg:#f4f2ed;--g1:#f0ede6;--g2:#ddd8cc;--g3:#9a9080;--g4:#5a5248;--red:#c0392b;--green:#27ae60;--r:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{background:var(--navy);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(26,39,68,.4);}
.hd-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;color:var(--gold2);}
.hd-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px;}
.hd-back{color:rgba(255,255,255,.5);font-size:12px;text-decoration:none;padding:6px 12px;border:1px solid rgba(255,255,255,.15);border-radius:6px;}
.gl{height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);}

/* 로그인 */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 61px);padding:20px;}
.login-box{background:#fff;border:1px solid var(--g2);border-radius:14px;padding:32px 28px;width:100%;max-width:340px;text-align:center;}
.login-icon{font-size:40px;margin-bottom:12px;}
.login-title{font-family:'Noto Serif KR',serif;font-size:20px;color:var(--navy);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--g3);margin-bottom:24px;}
.login-input{width:100%;padding:13px;border:1px solid var(--g2);border-radius:8px;font-size:15px;font-family:'Noto Sans KR',sans-serif;text-align:center;letter-spacing:3px;outline:none;margin-bottom:10px;}
.login-input:focus{border-color:var(--navy);}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--navy),var(--navy2));border:none;border-radius:8px;color:var(--gold2);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.login-err{color:var(--red);font-size:13px;margin-top:8px;min-height:20px;}

/* 어드민 */
#admin-screen{display:none;padding:20px;max-width:800px;margin:0 auto;padding-bottom:40px;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.admin-title{font-family:'Noto Serif KR',serif;font-size:18px;color:var(--navy);}
.admin-logout{padding:7px 14px;border:1px solid var(--g2);border-radius:6px;background:#fff;font-size:13px;color:var(--g4);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

.card{background:#fff;border:1px solid var(--g2);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:6px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-field{display:flex;flex-direction:column;gap:4px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:11px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.5px;}
.form-field input,.form-field select{padding:10px 12px;border:1px solid var(--g2);border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--g4);outline:none;}
.form-field input:focus{border-color:var(--navy);}
.add-btn{margin-top:14px;width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:8px;color:var(--navy);font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

.sites-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sites-count{font-size:13px;color:var(--g3);}
.site-item{padding:14px 0;border-bottom:1px solid var(--g1);display:flex;align-items:flex-start;gap:12px;}
.site-item:last-child{border-bottom:none;}
.site-info{flex:1;min-width:0;}
.site-name{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.site-meta{font-size:12px;color:var(--g3);display:flex;gap:10px;flex-wrap:wrap;}
.site-status{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;}
.ss-a{background:rgba(39,174,96,.12);color:var(--green);}
.ss-d{background:var(--g1);color:var(--g3);}
.site-btns{display:flex;gap:6px;flex-shrink:0;}
.sbtn{padding:6px 12px;border:1px solid var(--g2);border-radius:6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;background:#fff;}
.sbtn-del{color:var(--red);border-color:rgba(192,57,43,.2);}
.empty{padding:30px;text-align:center;color:var(--g3);font-size:14px;}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:400px;}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.mbtn{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.mbtn-s{background:var(--navy);color:var(--gold2);}
.mbtn-c{background:var(--g1);color:var(--g4);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:var(--gold2);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:300;display:none;white-space:nowrap;}
</style>
</head>
<body>
<header>
  <div>
    <div class="hd-title">🔐 사닥다리ON 관리자</div>
    <div class="hd-sub">현장 관리 · 위험성평가 설정</div>
  </div>
  <a href="/" class="hd-back">← 앱으로</a>
</header>
<div class="gl"></div>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">사닥다리ON 관리자 전용</div>
    <input type="password" class="login-input" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 어드민 -->
<div id="admin-screen">
  <div class="admin-header">
    <div class="admin-title">🏗️ 현장 관리</div>
    <button class="admin-logout" onclick="doLogout()">로그아웃</button>
  </div>

  <!-- 현장 추가 -->
  <div class="card">
    <div class="card-title">➕ 현장 추가</div>
    <div class="form-grid">
      <div class="form-field full">
        <label>현장명 *</label>
        <input type="text" id="add-name" placeholder="예: OO교회 신축공사 현장">
      </div>
      <div class="form-field">
        <label>수급인</label>
        <input type="text" id="add-suguin" placeholder="수급인명">
      </div>
      <div class="form-field">
        <label>상태</label>
        <select id="add-status">
          <option value="active">🟢 진행중</option>
          <option value="done">⚫ 완료</option>
        </select>
      </div>
      <div class="form-field">
        <label>공사 시작</label>
        <input type="month" id="add-start">
      </div>
      <div class="form-field">
        <label>공사 종료 (예정)</label>
        <input type="month" id="add-end">
      </div>
    </div>
    <button class="add-btn" onclick="addSite()">➕ 현장 추가하기</button>
  </div>

  <!-- 현장 목록 -->
  <div class="card">
    <div class="sites-header">
      <div class="card-title" style="margin:0">📋 등록된 현장</div>
      <div class="sites-count" id="sites-count">-</div>
    </div>
    <div id="sites-list"><div class="empty">현장 목록 로딩 중...</div></div>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <div class="modal-title">✏️ 현장 정보 수정</div>
    <div class="form-grid">
      <div class="form-field full"><label>현장명</label><input type="text" id="edit-name"></div>
      <div class="form-field"><label>수급인</label><input type="text" id="edit-suguin"></div>
      <div class="form-field"><label>상태</label>
        <select id="edit-status">
          <option value="active">🟢 진행중</option>
          <option value="done">⚫ 완료</option>
        </select>
      </div>
      <div class="form-field"><label>공사 시작</label><input type="month" id="edit-start"></div>
      <div class="form-field"><label>공사 종료</label><input type="month" id="edit-end"></div>
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-c" onclick="closeModal()">취소</button>
      <button class="mbtn mbtn-s" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SITES = [];
var EDIT_ID = null;
var PW = '';

// localStorage 저장/로드
function lsLoad() { try { return JSON.parse(localStorage.getItem('sd_sites') || '[]'); } catch(e) { return []; } }
function lsSave() { try { localStorage.setItem('sd_sites', JSON.stringify(SITES)); } catch(e) {} }

function doLogin() {
  var pw = document.getElementById('pw-input').value;
  if (!pw) { document.getElementById('login-err').textContent = '비밀번호를 입력해주세요'; return; }
  
  fetch('/api/sites', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ action: 'login', password: pw })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (d.success) { PW = pw; enterAdmin(); }
    else document.getElementById('login-err').textContent = d.error || '비밀번호 오류';
  })
  .catch(function(){
    // 오프라인 폴백
    if (pw === 'sadakdari2024' || pw === 'admin') { PW = pw; enterAdmin(); }
    else document.getElementById('login-err').textContent = '비밀번호가 틀렸습니다';
  });
}

function enterAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  // localStorage에서 로드
  SITES = lsLoad();
  renderSites();
}

function doLogout() {
  PW = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-err').textContent = '';
}

function renderSites() {
  var list = document.getElementById('sites-list');
  var count = document.getElementById('sites-count');
  var visible = SITES.filter(function(s){ return s.status !== 'deleted'; });
  count.textContent = '총 ' + visible.length + '개';
  if (!visible.length) { list.innerHTML = '<div class="empty">등록된 현장이 없습니다.<br>위 폼에서 추가해주세요.</div>'; return; }
  var html = '';
  visible.forEach(function(site){
    var isA = site.status === 'active';
    html += '<div class="site-item">';
    html += '<div class="site-info">';
    html += '<div class="site-name">'+escHtml(site.name)+'</div>';
    html += '<div class="site-meta">';
    html += '<span class="site-status '+(isA?'ss-a':'ss-d')+'">'+(isA?'🟢 진행중':'⚫ 완료')+'</span>';
    if (site.suguin) html += '<span>수급인: '+escHtml(site.suguin)+'</span>';
    if (site.startDate) html += '<span>'+site.startDate+(site.endDate?' ~ '+site.endDate:'')+'</span>';
    html += '</div></div>';
    html += '<div class="site-btns">';
    html += '<button class="sbtn" onclick="openEdit(\''+site.id+'\')">수정</button>';
    html += '<button class="sbtn sbtn-del" onclick="deleteSite(\''+site.id+'\')">삭제</button>';
    html += '</div></div>';
  });
  list.innerHTML = html;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addSite() {
  var name = document.getElementById('add-name').value.trim();
  if (!name) { alert('현장명을 입력해주세요'); return; }
  var newSite = {
    id: String(Date.now()),
    name: name,
    suguin: document.getElementById('add-suguin').value.trim(),
    startDate: document.getElementById('add-start').value,
    endDate: document.getElementById('add-end').value,
    status: document.getElementById('add-status').value,
    createdAt: new Date().toISOString()
  };
  // 중복 체크
  if (SITES.find(function(s){ return s.name === name && s.status !== 'deleted'; })) {
    if (!confirm('같은 이름의 현장이 있습니다. 추가하시겠습니까?')) return;
  }
  SITES.push(newSite);
  lsSave();
  renderSites();
  clearAddForm();
  showToast('✅ 현장이 추가되었습니다');
  // API도 시도
  fetch('/api/sites', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'add', password:PW, site:newSite}) }).catch(function(){});
}

function clearAddForm() {
  ['add-name','add-suguin','add-start','add-end'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('add-status').value = 'active';
}

function openEdit(id) {
  EDIT_ID = id;
  var site = SITES.find(function(s){ return s.id === id; });
  if (!site) return;
  document.getElementById('edit-name').value = site.name;
  document.getElementById('edit-suguin').value = site.suguin || '';
  document.getElementById('edit-start').value = site.startDate || '';
  document.getElementById('edit-end').value = site.endDate || '';
  document.getElementById('edit-status').value = site.status || 'active';
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() { document.getElementById('edit-modal').classList.remove('open'); EDIT_ID = null; }

function saveEdit() {
  if (!EDIT_ID) return;
  var idx = SITES.findIndex(function(s){ return s.id === EDIT_ID; });
  if (idx === -1) return;
  SITES[idx].name = document.getElementById('edit-name').value.trim();
  SITES[idx].suguin = document.getElementById('edit-suguin').value.trim();
  SITES[idx].startDate = document.getElementById('edit-start').value;
  SITES[idx].endDate = document.getElementById('edit-end').value;
  SITES[idx].status = document.getElementById('edit-status').value;
  lsSave();
  renderSites();
  closeModal();
  showToast('✅ 수정되었습니다');
  fetch('/api/sites', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'update', password:PW, id:EDIT_ID, site:SITES[idx]}) }).catch(function(){});
}

function deleteSite(id) {
  if (!confirm('이 현장을 삭제하시겠습니까?')) return;
  var idx = SITES.findIndex(function(s){ return s.id === id; });
  if (idx === -1) return;
  SITES[idx].status = 'deleted';
  lsSave();
  renderSites();
  showToast('🗑️ 현장이 삭제되었습니다');
  fetch('/api/sites', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'delete', password:PW, id:id}) }).catch(function(){});
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2500);
}
</script>
</body>
</html>
