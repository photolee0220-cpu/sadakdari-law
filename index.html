<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사닥다리종합건설 | 안전 법령 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--navy2:#243460;--gold:#c8a84b;--gold2:#e0c070;--bg:#f4f2ed;--g1:#f0ede6;--g2:#ddd8cc;--g3:#9a9080;--g4:#5a5248;--red:#c0392b;--r:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(26,39,68,.4);}
.ht{display:flex;align-items:center;justify-content:space-between;padding:0 36px;height:62px;border-bottom:1px solid rgba(200,168,75,.2);}
.lw{display:flex;align-items:center;gap:14px;}
.li{height:32px;background:#fff;border-radius:5px;padding:3px 7px;}
.ls{width:1px;height:24px;background:rgba(200,168,75,.35);}
.sn{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:600;color:var(--gold2);}
.ss{font-size:10px;color:rgba(200,168,75,.5);letter-spacing:1px;text-transform:uppercase;}
.hr2{display:flex;align-items:center;gap:16px;}
.lv{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.45);}
.dtt{width:6px;height:6px;border-radius:50%;background:#4caf8a;animation:bl 2s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.hd{font-size:11px;color:rgba(255,255,255,.3);}
.gl{height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);}
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 55%,#1e3a6e 100%);padding:44px 36px 40px;position:relative;overflow:hidden;}
.hi{max-width:880px;margin:0 auto;position:relative;}
.htag{display:inline-flex;align-items:center;gap:7px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.28);border-radius:20px;padding:4px 14px;font-size:11px;color:var(--gold2);font-weight:500;margin-bottom:18px;}
.hero h1{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;color:#fff;line-height:1.45;margin-bottom:10px;}
.hero h1 em{font-style:normal;color:var(--gold2);}
.hs{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:30px;}
.sb{background:rgba(255,255,255,.08);border:1px solid rgba(200,168,75,.22);border-radius:12px;padding:20px;}
.sr{display:flex;gap:10px;margin-bottom:12px;}
.sw{flex:1;}
.si{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(200,168,75,.28);border-radius:var(--r);padding:12px 16px;color:#fff;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.si::placeholder{color:rgba(255,255,255,.32);}
.si:focus{border-color:var(--gold);}
.sgn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--r);padding:12px 26px;color:var(--navy);font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
.sgn:disabled{opacity:.5;cursor:not-allowed;}
.ft{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.fl{font-size:11px;color:rgba(255,255,255,.28);margin-right:2px;}
.ftb{padding:5px 13px;border-radius:20px;border:1px solid rgba(200,168,75,.2);background:transparent;color:rgba(255,255,255,.45);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.ftb.on{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700;}
main{max-width:900px;margin:0 auto;padding:32px 24px 80px;width:100%;}
.sec{margin-bottom:26px;}
.slb{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:11px;}
.slb::after{content:'';flex:1;height:1px;background:var(--g2);}
.tgs{display:flex;flex-wrap:wrap;gap:8px;}
.tg{display:flex;align-items:center;gap:5px;padding:7px 14px;background:#fff;border:1px solid var(--g2);border-radius:20px;font-size:12px;color:var(--g4);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.tg:hover{border-color:var(--navy);color:var(--navy);}
.tg.hot{border-color:rgba(192,57,43,.25);color:var(--red);}
.rm{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.rc{font-size:13px;color:var(--g4);}
.rc strong{color:var(--navy);font-weight:700;}
.rcl{font-size:12px;color:var(--g3);background:none;border:1px solid var(--g2);border-radius:5px;padding:4px 11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.card{background:#fff;border:1px solid var(--g2);border-radius:var(--r);margin-bottom:4px;overflow:hidden;cursor:pointer;transition:all .2s;}
.card:hover{border-color:var(--navy);box-shadow:0 4px 18px rgba(26,39,68,.1);transform:translateY(-1px);}
.ch{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 18px 12px;gap:12px;}
.ct{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;color:var(--navy);line-height:1.4;}
.bdg{display:flex;gap:5px;flex-shrink:0;}
.bd{padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
.blaw{background:rgba(26,39,68,.08);color:var(--navy);}
.bpre{background:rgba(200,168,75,.15);color:#7a5e10;}
.bsaf{background:rgba(192,57,43,.1);color:var(--red);}
.cm{padding:0 18px 10px;display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--g3);}
.cp{padding:11px 18px 15px;font-size:13px;color:var(--g4);line-height:1.75;border-top:1px solid var(--g1);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.dp{background:#fff;border:2px solid var(--navy);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.dph{background:var(--navy);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.dpt{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;color:#fff;}
.dpx{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:15px;}
.dpb{padding:20px;}
.dps2{margin-bottom:18px;}
.dpl{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--g1);}
.dpc{font-size:13px;color:var(--g4);line-height:1.9;white-space:pre-wrap;max-height:260px;overflow-y:auto;}
.dlk{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 16px;background:var(--navy);color:#fff;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;}
.ld{text-align:center;padding:60px 20px;}
.sp{width:36px;height:36px;border:3px solid var(--g2);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ld p{color:var(--g3);font-size:13px;}
.em{text-align:center;padding:60px 20px;}
.ei{font-size:44px;margin-bottom:16px;}
.em h3{font-size:16px;color:var(--g4);margin-bottom:8px;font-weight:600;}
.em p{font-size:13px;color:var(--g3);}
.err{background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.2);border-radius:var(--r);padding:14px 18px;color:var(--red);font-size:13px;}
footer{background:var(--navy);border-top:3px solid var(--gold);padding:16px 36px;display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.fli{height:22px;background:#fff;border-radius:4px;padding:2px 6px;}
.ft2{font-size:11px;color:rgba(255,255,255,.3);line-height:1.7;text-align:right;}
@media(max-width:640px){.ht,.hero{padding-left:16px;padding-right:16px;}.hero h1{font-size:22px;}main{padding:24px 14px 60px;}.sr{flex-direction:column;}footer{flex-direction:column;gap:10px;}.ft2{text-align:center;}}
</style>
</head>

<script>
(function() {
  var TAB = 'all';
  var RES = [];
  var OI = -1;

  function p(n) { return String(n).padStart(2,'0'); }
  function fd(d) {
    if (!d) return '-';
    var s = String(d);
    return s.length === 8 ? s.slice(0,4)+'.'+s.slice(4,6)+'.'+s.slice(6,8) : d;
  }
  function isSafe(t) { return /안전|중대재해|산업재해|추락|붕괴|폭발|화재|재해/.test(t); }

  var d = new Date();
  var hdEl = document.getElementById('hd');
  if (hdEl) hdEl.textContent = d.getFullYear()+'.'+p(d.getMonth()+1)+'.'+p(d.getDate())+' KST';

  var lawTags = [
    {label:'중대재해처벌법', hot:true},
    {label:'산업안전보건법', hot:true},
    {label:'건설기술진흥법', hot:false},
    {label:'건설산업기본법', hot:false},
    {label:'건축법', hot:false},
    {label:'산업재해보상보험법', hot:false}
  ];
  var precTags = [
    {label:'추락사고', hot:true},
    {label:'안전관리자 의무', hot:false},
    {label:'건설 하자보수', hot:false},
    {label:'건설공사 도급', hot:false},
    {label:'중대재해 처벌', hot:false},
    {label:'건설현장 화재', hot:false}
  ];

  var ltEl = document.getElementById('law-tags');
  if (ltEl) lawTags.forEach(function(t) {
    var el = document.createElement('span');
    el.className = 'tg' + (t.hot ? ' hot' : '');
    el.textContent = t.label;
    el.onclick = function() { ql(t.label); };
    ltEl.appendChild(el);
  });

  var ptEl = document.getElementById('prec-tags');
  if (ptEl) precTags.forEach(function(t) {
    var el = document.createElement('span');
    el.className = 'tg' + (t.hot ? ' hot' : '');
    el.textContent = t.label;
    el.onclick = function() { qp(t.label); };
    ptEl.appendChild(el);
  });

  var sgnEl = document.getElementById('sgn');
  var qEl = document.getElementById('q');

  ['all','law','prec','safe'].forEach(function(id) {
    var el = document.getElementById('tab-'+id);
    if (el) el.onclick = function() {
      document.querySelectorAll('.ftb').forEach(function(b) { b.classList.remove('on'); });
      el.classList.add('on');
      TAB = id;
    };
  });

  if (sgnEl) sgnEl.onclick = function() { go(); };
  if (qEl) qEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') go(); });

  function ql(q) {
    qEl.value = q;
    document.querySelectorAll('.ftb').forEach(function(b,i) { b.classList.toggle('on', i===1); });
    TAB = 'law';
    go();
  }

  function qp(q) {
    qEl.value = q;
    document.querySelectorAll('.ftb').forEach(function(b,i) { b.classList.toggle('on', i===2); });
    TAB = 'prec';
    go();
  }

  function go() {
    var q = qEl.value.trim();
    if (!q) return;
    setLd();
    RES = [];
    OI = -1;
    var dl = TAB==='all'||TAB==='law'||TAB==='safe';
    var dp = TAB==='all'||TAB==='prec'||TAB==='safe';
    var sq = (TAB==='safe' && !/안전|중대재해/.test(q)) ? q+' 안전' : q;

    Promise.all([
      dl ? callAPI('law', sq) : Promise.resolve([]),
      dp ? callAPI('prec', sq) : Promise.resolve([])
    ]).then(function(results) {
      RES = results[0].concat(results[1]);
      render(q);
    }).catch(function(e) {
      showErr(e.message);
    });
  }

  function callAPI(target, query) {
    return fetch('/api/law?target='+target+'&query='+encodeURIComponent(query))
      .then(function(res) {
        if (!res.ok) throw new Error('서버 오류 ' + res.status);
        return res.text();
      }).then(function(txt) {
        return parseTxt(txt, target);
      });
  }

  function callDetail(mst, id) {
    var param = mst ? 'mst='+mst : 'id='+id;
    return fetch('/api/law?'+param)
      .then(function(res) { return res.ok ? res.json() : null; })
      .catch(function() { return null; });
  }

  function parseTxt(txt, target) {
    try {
      var b = JSON.parse(txt);
      if (target === 'law') {
        var arr = (b && b.LawSearch && b.LawSearch.law) ? b.LawSearch.law : [];
        if (!Array.isArray(arr)) arr = [arr];
        return arr.filter(Boolean).map(function(i) {
          return {
            type:'law', title:i['법령명한글']||'법령명 없음',
            ministry:i['소관부처명']||'', date:i['시행일자']||'',
            promDate:i['공포일자']||'', mst:i['법령일련번호']||'', no:i['공포번호']||'',
            preview:'소관부처: '+(i['소관부처명']||'-')+' | 시행일: '+fd(i['시행일자'])+' | 공포번호: '+(i['공포번호']||'-')
          };
        });
      } else {
        var arr2 = (b && b.PrecSearch && b.PrecSearch.prec) ? b.PrecSearch.prec : [];
        if (!Array.isArray(arr2)) arr2 = [arr2];
        return arr2.filter(Boolean).map(function(i) {
          return {
            type:'prec', title:i['사건명']||i['사건번호']||'판례',
            court:i['법원명']||'', date:i['선고일자']||'',
            caseNo:i['사건번호']||'', verdict:i['선고']||'', seq:i['판례일련번호']||'',
            preview:i['판시사항']||i['판결요지']||''
          };
        });
      }
    } catch(e) { return []; }
  }

  function render(q) {
    var a = document.getElementById('area');
    if (!RES.length) {
      a.innerHTML = '<div class="em"><div class="ei">검색</div><h3>검색 결과가 없습니다</h3><p>'+q+'에 대한 결과를 찾지 못했습니다.</p></div>';
      return;
    }
    var html = '<div class="rm"><div class="rc"><strong>'+q+'</strong> 검색 결과 <strong>'+RES.length+'건</strong></div><button class="rcl" id="clearBtn">초기화</button></div>';
    RES.forEach(function(it, i) {
      html += '<div class="card" data-idx="'+i+'">';
      html += '<div class="ch"><div class="ct">'+it.title+'</div>';
      html += '<div class="bdg">';
      html += it.type==='law' ? '<span class="bd blaw">법령</span>' : '<span class="bd bpre">판례</span>';
      if (isSafe(it.title)) html += '<span class="bd bsaf">안전</span>';
      html += '</div></div>';
      html += '<div class="cm">';
      if (it.court) html += '<span>'+it.court+'</span>';
      if (it.ministry) html += '<span>'+it.ministry+'</span>';
      if (it.date) html += '<span>'+fd(it.date)+'</span>';
      if (it.caseNo) html += '<span>'+it.caseNo+'</span>';
      if (it.verdict) html += '<span>'+it.verdict+'</span>';
      html += '</div>';
      if (it.preview) html += '<div class="cp">'+it.preview+'</div>';
      html += '</div><div id="d'+i+'" style="display:none"></div>';
    });
    a.innerHTML = html;
    var cb = document.getElementById('clearBtn');
    if (cb) cb.onclick = function() { a.innerHTML = ''; RES = []; };
    a.querySelectorAll('.card').forEach(function(el) {
      el.onclick = function() { tog(parseInt(el.getAttribute('data-idx'))); };
    });
  }

  function tog(i) {
    var box = document.getElementById('d'+i);
    if (!box) return;
    if (box.style.display !== 'none') { box.style.display='none'; return; }
    if (OI >= 0 && OI !== i) {
      var prev = document.getElementById('d'+OI);
      if (prev) prev.style.display = 'none';
    }
    OI = i;
    box.innerHTML = '<div class="ld" style="padding:24px"><div class="sp"></div><p>불러오는 중...</p></div>';
    box.style.display = 'block';
    var it = RES[i];
    callDetail(it.type==='law' ? it.mst : null, it.type==='prec' ? it.seq : null).then(function(d) {
      var html = '';
      if (it.type === 'law' && it.mst) {
        var lD = d ? (d['법령'] || d['law'] || {}) : {};
        var arts = lD['조문'] ? (Array.isArray(lD['조문']) ? lD['조문'] : [lD['조문']]) : [];
        html = '<div class="dp"><div class="dph"><div class="dpt">'+it.title+'</div>';
        html += '<button class="dpx" data-close="'+i+'">X</button></div><div class="dpb">';
        html += '<div class="dps2"><div class="dpl">법령 기본 정보</div>';
        html += '<div class="dpc">소관부처: '+(it.ministry||'-')+'&#10;시행일: '+fd(it.date)+'&#10;공포번호: '+(it.no||'-')+'</div></div>';
        if (arts.length) {
          html += '<div class="dps2"><div class="dpl">주요 조문</div><div class="dpc">';
          arts.slice(0,5).forEach(function(a) {
            html += '['+( a['조문번호']||'')+'] '+(a['조문제목']||'')+'&#10;'+(a['조문내용']||'')+'&#10;&#10;';
          });
          html += '</div></div>';
        }
        html += '<a class="dlk" href="https://www.law.go.kr/lsInfoP.do?lsiSeq='+it.mst+'" target="_blank">법제처 원문 보기</a>';
        html += '</div></div>';
      } else if (it.type === 'prec' && it.seq) {
        var pr = d ? (d['PrecService'] || d || {}) : {};
        html = '<div class="dp"><div class="dph"><div class="dpt">'+it.title+'</div>';
        html += '<button class="dpx" data-close="'+i+'">X</button></div><div class="dpb">';
        html += '<div class="dps2"><div class="dpl">사건 정보</div>';
        html += '<div class="dpc">법원: '+(it.court||'-')+'&#10;사건번호: '+(it.caseNo||'-')+'&#10;선고일: '+fd(it.date)+'</div></div>';
        if (pr['판시사항']) html += '<div class="dps2"><div class="dpl">판시사항</div><div class="dpc">'+pr['판시사항']+'</div></div>';
        if (pr['판결요지']||it.preview) html += '<div class="dps2"><div class="dpl">판결요지</div><div class="dpc">'+(pr['판결요지']||it.preview)+'</div></div>';
        html += '<a class="dlk" href="https://www.law.go.kr/precInfoP.do?precSeq='+it.seq+'" target="_blank">판례 원문 보기</a>';
        html += '</div></div>';
      }
      box.innerHTML = html;
      var cb2 = box.querySelector('[data-close]');
      if (cb2) cb2.onclick = function() { box.style.display='none'; };
    });
  }

  function setLd() {
    if (sgnEl) { sgnEl.disabled = true; sgnEl.textContent = '검색중...'; }
    document.getElementById('area').innerHTML = '<div class="ld"><div class="sp"></div><p>법제처에서 데이터를 불러오는 중...</p></div>';
    setTimeout(function() { if (sgnEl) { sgnEl.disabled=false; sgnEl.textContent='검색'; } }, 15000);
  }

  function showErr(m) {
    if (sgnEl) { sgnEl.disabled = false; sgnEl.textContent = '검색'; }
    document.getElementById('area').innerHTML = '<div class="err">오류: '+m+'</div>';
  }
})();
</script>
</body>
</html>
